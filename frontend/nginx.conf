server {
    listen 80;

    auth_basic "Pi Monitor";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
    }
}